blueprint:
  name: Z-Wave Scene Controller / Remote Switch
  description: >
    Map actions to button presses on any Z-Wave device that supports Central
    Scene (Scene 001 / Scene 002). Originally built around the Zooz ZEN34
    remote switch, but should work with any Z-Wave device that sends Central
    Scene events with two buttons or paddles. Supports single tap through 5x
    tap, hold, and release for both the upper and lower buttons (up to 14
    actions total). Each action input is optional and defaults to doing nothing.
    Hold actions repeat on a configurable interval until the button is released,
    making them ideal for smooth brightness ramping.
  domain: automation
  input:
    zwave_device:
      name: Z-Wave Scene Controller
      description: >
        The Z-Wave device to use as a trigger. Select any device that sends
        Central Scene events (e.g. Zooz ZEN34/ZEN32, Inovelli, GE/Jasco,
        Aeotec NanoMote, etc.).
      selector:
        device:
          integration: zwave_js
    tap_up_1x:
      name: Upper Button Single Tap
      description: Action to run when the upper button is tapped once.
      default: []
      selector:
        action: {}
    tap_up_2x:
      name: Upper Button Double Tap
      description: Action to run when the upper button is tapped twice.
      default: []
      selector:
        action: {}
    tap_up_3x:
      name: Upper Button Triple Tap
      description: Action to run when the upper button is tapped three times.
      default: []
      selector:
        action: {}
    tap_up_4x:
      name: Upper Button 4x Tap
      description: Action to run when the upper button is tapped four times.
      default: []
      selector:
        action: {}
    tap_up_5x:
      name: Upper Button 5x Tap
      description: Action to run when the upper button is tapped five times.
      default: []
      selector:
        action: {}
    hold_up:
      name: Upper Button Hold
      description: >
        Action to repeat while the upper button is held down. Runs on a
        loop until the button is released, useful for gradually increasing
        brightness.
      default: []
      selector:
        action: {}
    release_up:
      name: Upper Button Release
      description: Action to run when the upper button is released after a hold.
      default: []
      selector:
        action: {}
    tap_down_1x:
      name: Lower Button Single Tap
      description: Action to run when the lower button is tapped once.
      default: []
      selector:
        action: {}
    tap_down_2x:
      name: Lower Button Double Tap
      description: Action to run when the lower button is tapped twice.
      default: []
      selector:
        action: {}
    tap_down_3x:
      name: Lower Button Triple Tap
      description: Action to run when the lower button is tapped three times.
      default: []
      selector:
        action: {}
    tap_down_4x:
      name: Lower Button 4x Tap
      description: Action to run when the lower button is tapped four times.
      default: []
      selector:
        action: {}
    tap_down_5x:
      name: Lower Button 5x Tap
      description: Action to run when the lower button is tapped five times.
      default: []
      selector:
        action: {}
    hold_down:
      name: Lower Button Hold
      description: >
        Action to repeat while the lower button is held down. Runs on a
        loop until the button is released, useful for gradually decreasing
        brightness.
      default: []
      selector:
        action: {}
    release_down:
      name: Lower Button Release
      description: Action to run when the lower button is released after a hold.
      default: []
      selector:
        action: {}
    hold_repeat_interval:
      name: Hold Repeat Interval
      description: >
        Time in milliseconds between each repeat of the hold action.
        Lower values make brightness changes faster.
      default: 500
      selector:
        number:
          min: 100
          max: 2000
          step: 100
          unit_of_measurement: ms

mode: restart
max_exceeded: silent

trigger:
  # Upper Button / Paddle (Scene 001)
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 001
      value: KeyPressed
    id: tap_up
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 001
      value: KeyPressed2x
    id: tap_up_2x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 001
      value: KeyPressed3x
    id: tap_up_3x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 001
      value: KeyPressed4x
    id: tap_up_4x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 001
      value: KeyPressed5x
    id: tap_up_5x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 001
      value: KeyHeldDown
    id: hold_up
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 001
      value: KeyReleased
    id: release_up
  # Lower Button / Paddle (Scene 002)
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 002
      value: KeyPressed
    id: tap_down
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 002
      value: KeyPressed2x
    id: tap_down_2x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 002
      value: KeyPressed3x
    id: tap_down_3x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 002
      value: KeyPressed4x
    id: tap_down_4x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 002
      value: KeyPressed5x
    id: tap_down_5x
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 002
      value: KeyHeldDown
    id: hold_down
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      device_id: !input zwave_device
      label: Scene 002
      value: KeyReleased
    id: release_down

action:
  - choose:
      # Upper Button Taps
      - conditions:
          - condition: trigger
            id: tap_up
        sequence: !input tap_up_1x
      - conditions:
          - condition: trigger
            id: tap_up_2x
        sequence: !input tap_up_2x
      - conditions:
          - condition: trigger
            id: tap_up_3x
        sequence: !input tap_up_3x
      - conditions:
          - condition: trigger
            id: tap_up_4x
        sequence: !input tap_up_4x
      - conditions:
          - condition: trigger
            id: tap_up_5x
        sequence: !input tap_up_5x
      # Upper Button Hold
      - conditions:
          - condition: trigger
            id: hold_up
        sequence:
          - repeat:
              count: 100
              sequence:
                - choose:
                    - conditions: "{{ true }}"
                      sequence: !input hold_up
                - delay:
                    milliseconds: !input hold_repeat_interval
      # Upper Button Release
      - conditions:
          - condition: trigger
            id: release_up
        sequence: !input release_up
      # Lower Button Taps
      - conditions:
          - condition: trigger
            id: tap_down
        sequence: !input tap_down_1x
      - conditions:
          - condition: trigger
            id: tap_down_2x
        sequence: !input tap_down_2x
      - conditions:
          - condition: trigger
            id: tap_down_3x
        sequence: !input tap_down_3x
      - conditions:
          - condition: trigger
            id: tap_down_4x
        sequence: !input tap_down_4x
      - conditions:
          - condition: trigger
            id: tap_down_5x
        sequence: !input tap_down_5x
      # Lower Button Hold
      - conditions:
          - condition: trigger
            id: hold_down
        sequence:
          - repeat:
              count: 100
              sequence:
                - choose:
                    - conditions: "{{ true }}"
                      sequence: !input hold_down
                - delay:
                    milliseconds: !input hold_repeat_interval
      # Lower Button Release
      - conditions:
          - condition: trigger
            id: release_down
        sequence: !input release_down
